<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const numero = prompt("Digite um número:");
        document.body.innerHTML = `Seu número é: ${numero} <br />`;
        document.body.innerHTML += `Raiz quadrada: ${Math.sqrt(numero)} <br />`;
        document.body.innerHTML += `${numero} é inteiro? ${Number.isInteger(parseInt(numero))} <br />`;
        document.body.innerHTML += `É NaN? ${Number.isNaN(numero)} <br />`;
        document.body.innerHTML += `Arredondando para baixo: ${Math.floor(numero)} <br />`;
        document.body.innerHTML += `Arredondando para cima: ${Math.ceil(numero)} <br />`;
        document.body.innerHTML += `Com duas casas decimais: ${Number.parseFloat(numero).toFixed(2)} <br />`;
    </script>
    
</body>
</html>
